ekf_filter_node:
  ros__parameters:
    frequency: 30.0
    two_d_mode: true
    publish_tf: true
    publish_acceleration: false
    map_frame: map
    odom_frame: odom
    base_link_frame: base_footprint
    world_frame: odom

    # Wheel Odometry (Twist)
    twist0: /wheel/odom
    twist0_config: [false, false, false,
                    false, false, false,
                    true,  true,  false, 
                    false, false, true,
                    false, false, false]
    twist0_differential: false
    twist0_queue_size: 10

    # IMU
    imu0: /imu
    imu0_config: [false, false, false,
                  true,  true,  true,
                  false, false, false,
                  true,  true,  true,
                  true,  true,  true]
    imu0_differential: false
    imu0_queue_size: 10
    imu0_remove_gravitational_acceleration: true
